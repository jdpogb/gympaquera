<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload de Fotos - Regras de Privacidade</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; color: #333; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Alerta de Regras */
        .alert { background-color: #ffe5e5; border-left: 5px solid #ff4d4d; padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        .alert h4 { margin: 0 0 10px 0; color: #cc0000; }
        .alert p { margin: 0; font-weight: bold; font-size: 0.9em; }

        /* Grid de Upload */
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .photo-box { aspect-ratio: 1 / 1; border: 2px dashed #bbb; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; background: #fafafa; transition: 0.3s; }
        .photo-box:hover { border-color: #3498db; background: #ebf5fb; }
        .photo-box span { font-size: 2rem; color: #bbb; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Seção de Exemplos */
        .examples { border-top: 1px solid #eee; pt: 20px; margin-top: 20px; }
        .example-list { display: flex; gap: 10px; margin-top: 10px; }
        .example-item { flex: 1; text-align: center; font-size: 0.8em; color: #666; }
        .example-img { width: 100%; border-radius: 6px; filter: grayscale(50%); }
    </style>
</head>
<body>

<div class="container">
    <h2>Adicionar Fotos</h2>
    <p>Clique nos quadros para adicionar/alterar até 3 fotos.</p>

    <div class="alert">
        <h4>⚠️ REGRAS IMPORTANTES</h4>
        <p>PROIBIDO EXPOSIÇÃO FOTOS ÍNTIMAS E DO ROSTO</p>
    </div>

    <div class="photo-grid">
        <div class="photo-box" onclick="document.getElementById('input-1').click()">
            <span id="plus-1">+</span>
            <input type="file" id="input-1" hidden accept="image/*">
        </div>
        <div class="photo-box" onclick="document.getElementById('input-2').click()">
            <span id="plus-2">+</span>
            <input type="file" id="input-2" hidden accept="image/*">
        </div>
        <div class="photo-box" onclick="document.getElementById('input-3').click()">
            <span id="plus-3">+</span>
            <input type="file" id="input-3" hidden accept="image/*">
        </div>
    </div>

    <div class="examples">
        <h4>SEGUE ALGUNS EXEMPLOS ABAIXO</h4>
        <div class="example-list">
            <div class="example-item">
<img src="/home/asx/Modelos/boy.jpeg" alt="Descrição da Imagem 1">
                Mam | Homem
            </div>
            <div class="example-item">
<img src="/home/asx/Modelos/girl.jpeg" alt="Descrição da Imagem 1">
                Woman | Mulher
            </div>
            <div class="example-item">
<img src="/home/asx/Modelos/couple.jpeg" alt="Descrição da Imagem 1">
                Couple | Casal
            </div>
        </div>
    </div>
</div>

</body>
</html>
