<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusivo - Clube Privado</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #333; padding: 40px; border-radius: 10px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input { padding: 10px; width: 80%; margin: 20px 0; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #e91e63; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #c2185b; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Membro Convidado</h2>
    <p>Este é um círculo restrito. Insira seu código de convite:</p>
    <input type="text" id="inviteCode" placeholder="Código de 6 dígitos">
    <br>
    <button onclick="verificarConvite()">Entrar no Clube</button>
    <p id="msg" style="color: #ff5252; margin-top: 10px;"></p>
</div>

<script>
    function verificarConvite() {
        const codigo = document.getElementById('inviteCode').value;
        const mensagem = document.getElementById('msg');
        
        // Exemplo de lógica simples (na prática, isso deve ser validado no servidor)
        if (codigo === "VIP2024") {
            window.location.href = "home_privada.html"; // Redireciona para a rede social
        } else {
            mensagem.innerText = "Código inválido ou já utilizado.";
        }
    }
</script>

</body>
</html>
