<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Clube Exclusivo | Login</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .invite-box { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; width: 80%; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #ff4b2b; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="invite-box">
    <h2>💖 Bem-vindo ao Clube</h2>
    <p>Este é um círculo restrito. Insira seu código de convite:</p>
    <input type="text" id="inviteCode" placeholder="Ex: VIP-2024-XYZ">
    <br>
    <button onclick="validarConvite()">Entrar</button>
    <p id="error" style="color: red; display: none;">Código inválido ou expirado.</p>
</div>

<script>
    function validarConvite() {
        const codigo = document.getElementById('inviteCode').value;
        // No mundo real, isso seria validado em um banco de dados via API
        const codigosValidos = ["VIP-2024", "LOVE-99", "SECRET"];

        if (codigosValidos.includes(codigo)) {
            localStorage.setItem('acessoPermitido', 'true');
            window.location.href = "file:///home/asx/%C3%81rea%20de%20trabalho/Cadastro%20Convite.html";
        } else {
            document.getElementById('error').style.display = 'block';
        }
    }
</script>

</body>
</html>
