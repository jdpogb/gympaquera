<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convidar para Comunidade</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 50px; }
        
        .invite-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }

        h2 { color: #333; margin-top: 0; font-size: 1.5rem; }
        p { color: #666; font-size: 0.9rem; line-height: 1.4; }

        .input-group {
            display: flex;
            margin-top: 20px;
            gap: 8px;
        }

        input[type="email"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
        }

        input[type="email"]:focus { border-color: #4A90E2; }

        button {
            background-color: #4A90E2;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover { background-color: #357ABD; }
    </style>
</head>
<body>

<div class="invite-card">
    <h2>Convidar amigos</h2>
    <p>Ajude nossa comunidade a crescer! Envie um convite para quem você acha que vai curtir o nosso conteúdo.</p>
    
    <form action="#" method="POST" class="input-group">
        <input type="email" placeholder="E-mail do convidado" required>
        <button type="submit">Enviar</button>
    </form>
</div>

</body>
</html>
