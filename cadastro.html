<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro Gyn</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #333; text-align: center; margin-bottom: 25px; }
        .field { margin-bottom: 18px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #e91e63; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #c2185b; }
        .discretion-note { font-size: 12px; color: #d32f2f; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Criar Seu Perfil</h2>
    <form action="/processar-cadastro" method="POST">
        
        <div class="field">
            <label>ID Matrícula: [ Wellhub | Particular | TotalPass ]</label>
            <input type="text" name="id_matricula" placeholder="Ex: 123456" required>
        </div>

        <div>
            <label for="tipo_matricula">Qual a sua Gym:</label>
            <select id="tipo_matricula" name="tipo_matricula" required>
                <option value="" disabled selected>Selecione uma opção</option>
                <option value="id">Smart Fit Academia</option>
                <option value="id">OH!FIT Academia</option>
                <option value="id">Xprime Academia</option>
                <option value="id">Skyfit Academia</option>
                <option value="id">Flynow Academia</option>
                <option value="id">Fly Fit Academia</option>
                <option value="id">Malibu Academia</option>
                <option value="id">Fit House Academia</option>
                <option value="id">GalvãoGym Academia</option>
                <option value="id">Panobianco Academia</option>
                <option value="id">Elity Fitness Academia</option>
                <option value="id">Corpus Gym Academia</option>
            </select>
        </div>

        <div class="field">
            <label>Seu E-mail:</label>
            <input type="email" name="email" placeholder="exemplo@email.com" required>
        </div>

        <div class="field">
            <label>Seu Nickname:</label>
            <input type="text" name="nickname" placeholder="Como quer ser chamado(a)" required>
        </div>

        <div class="field">
            <label>Eu sou:</label>
            <select name="eu_sou">
                <option value="homem">Homem</option>
                <option value="mulher">Mulher</option>
                <option value="casais">Casal</option>
            </select>
        </div>

        <div class="field">
            <label>Interessado em:</label>
            <select name="interessado">
                <option value="homens">Homens</option>
                <option value="mulheres">Mulheres</option>
                <option value="todos">Todos</option>
            </select>
        </div>

        <div class="field">
            <label>Gênero:</label>
            <select name="genero">
                <option value="heterossexual">Heterossexual</option>
                <option value="bissexual">Bissexual</option>
                <option value="gay">Gay</option>
                <option value="lesbica">Lésbica</option>
            </select>
        </div>

        <div class="field">
            <label>Idade:</label>
            <input type="number" name="idade" min="18" max="100" required>
        </div>

        <div class="field">
            <label>Estado Civil:</label>
            <select name="estado_civil">
                <option value="solteira">Solteira</option>
                <option value="solteiro">Solteiro</option>
                <option value="solteiro">Namorando</option>
                <option value="casal_mulher">Casal [ Quer Mulheres ]</option>
                <option value="casal_troca">Casal [ Quer Troca Casais ]</option>
                <option value="casal_ambos">Casal [ Quer Homens ]</option>
                <option value="casado_sigilo">Casado [ Sigilo e Discrição Total ]</option>
                <option value="casada_sigilo">Casada [ Sigilo e Discrição Total ]</option>
            </select>
            <p class="discretion-note">* Garantimos sigilo absoluto das suas informações.</p>
        </div>

        <div class="field">
            <label>Estado:</label>
            <input type="text" name="estado" placeholder="Ex: São Paulo" required>
        </div>

        <div class="field">
            <label>Cidade:</label>
            <input type="text" name="cidade" placeholder="Ex: Campinas" required>
        </div>


<meta charset="UTF-8">
    <title>Perfil com Fotos</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f4f9; }
        .container { display: flex; gap: 20px; margin-top: 20px; }
        .photo-slot { width: 150px; height: 150px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; background: white; position: relative; overflow: hidden; border-radius: 8px; }
        img { width: 100%; height: 100%; object-fit: cover; }
        input[type="file"] { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
        p { color: #666; font-size: 14px; text-align: center; }
    </style>
</head>
<body>


    <h3>Proibido exposição do rosto e fotos íntimas</h3>
    <p>Clique nos quadros para adicionar/alterar até 3 fotos</p>

    <div class="container">
        <!-- Slot 1 -->
        <div class="photo-slot" id="slot0">
            <span>+</span>
            <input type="file" accept="image/*" onchange="uploadFoto(event, 0)">
        </div>
        <!-- Slot 2 -->
        <div class="photo-slot" id="slot1">
            <span>+</span>
            <input type="file" accept="image/*" onchange="uploadFoto(event, 1)">
        </div>
        <!-- Slot 3 -->
        <div class="photo-slot" id="slot2">
            <span>+</span>
            <input type="file" accept="image/*" onchange="uploadFoto(event, 2)">
        </div>
    </div>

    <p>Segue ABAIXO alguns exemplos de COMO postar suas FOTOS</p>

<style>
        /* Estilo básico para deixar o visual limpo */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            text-align: center;
        }

        h1 {
            color: #333;
        }

        /* Container que organiza as fotos em linha */
        .galeria {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        /* Estilo individual das fotos */
        .foto-card {
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .foto-card img {
            width: 300px; /* Largura da foto */
            height: 200px; /* Altura da foto */
            object-fit: cover; /* Ajusta a imagem sem distorcer */
            border-radius: 4px;
        }

        .foto-card p {
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="galeria">
        <!-- Foto 1 -->
        <div class="foto-card">
            <img src="https://jdpogb.github.io/gympaquera/1.jpeg" alt="Descrição da Imagem 1">
            <p>ELES</p>
        </div>

        <!-- Foto 2 -->
        <div class="foto-card">
            <img src="https://jdpogb.github.io/gympaquera/2.jpeg" alt="Descrição da Imagem 2">
            <p>ELAS</p>
        </div>

        <!-- Foto 3 -->
        <div class="foto-card">
            <img src="https://jdpogb.github.io/gympaquera/3.jpeg" alt="Descrição da Imagem 3">
            <p>CASAL</p>
        </div>
    </div>

</body>


    <script>
        // Carrega fotos salvas ao abrir a página
        window.onload = () => {
            for (let i = 0; i < 3; i++) {
                const savedImg = localStorage.getItem('perfil_foto_' + i);
                if (savedImg) displayImg(savedImg, i);
            }
        };

        function uploadFoto(event, index) {
            const reader = new FileReader();
            reader.onload = function() {
                const base64 = reader.result;
                localStorage.setItem('perfil_foto_' + index, base64);
                displayImg(base64, index);
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        function displayImg(src, index) {
            const div = document.getElementById('slot' + index);
            div.innerHTML = `<img src="${src}"><input type="file" accept="image/*" onchange="uploadFoto(event, ${index})">`;
        }
    </script>

<br>
        <button type="submit">Finalizar Cadastro</button>
    </form>
</div>


</body>
</html>
